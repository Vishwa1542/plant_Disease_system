# render.yaml — Deploy backend to Render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: plantguard-api
    env: python
    region: oregon
    plan: free
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
    healthCheckPath: /health
